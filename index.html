<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Hook to detect WebKit autofill start */
    @keyframes onAutoFillStart { from {} to {} }
    input:-webkit-autofill { animation-name: onAutoFillStart; animation-duration: 0.001s; }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="account_icon.svg" alt="Account Icon" class="login-icon" />
    <div style="margin-bottom:10px;">
      
    </div>

  <input type="email" id="email" placeholder="Email" autocomplete="email" />
    <span id="email-error" style="color:#ff5252; font-size:14px; display:none;"></span>
  <input type="password" id="password" placeholder="Password" autocomplete="current-password" />

    <div class="progress-bar" id="progressBar"></div>

    <button id="login-btn" onclick="login()" disabled>Login</button>
    <button onclick="goToRegister()">Register</button>
    <a href="password-reset.html" style="color: #2d2d2d; text-decoration: none; font-size: 14px; margin-top: 10px; display: block; text-align: center;">Forgot Password?</a>
  </div>

  <!-- Toast Notification -->
  <div id="toast" style="
    visibility:hidden;
    min-width:250px;
    margin-left:-125px;
    background:#323232;
    color:#fff;
    text-align:center;
    border-radius:4px;
    padding:16px;
    position:fixed;
    z-index:9999;
    left:50%;
    bottom:30px;
    font-size:17px;
    cursor:pointer;
    transition:visibility 0s, opacity 0.5s linear;
    opacity:0;
  "></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
  <script src="global.js" defer></script>
  <script src="script.js" defer></script>
  <script>
    // Autofocus and simple validation hints
    document.addEventListener('DOMContentLoaded', function(){
      var email = document.getElementById('email');
      if (email) email.focus();
      var btn = document.getElementById('login-btn');
      var pwd = document.getElementById('password');
      function validate(){ btn.disabled = !(email.value && pwd.value && /@/.test(email.value)); }
      email.addEventListener('input', validate);
      pwd.addEventListener('input', validate);
    });
  </script>
</body>
</html>
