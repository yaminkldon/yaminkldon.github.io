<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <img src="account_icon.svg" alt="Account Icon" class="login-icon" />
    <div style="margin-bottom:10px;">
      
    </div>

    <input type="email" id="register-email" placeholder="Email" autocomplete="email" />
    <span id="register-email-error" style="color:#ff5252; font-size:14px; display:none;"></span>
    <input type="password" id="register-password" placeholder="Password" autocomplete="new-password" />
    <input type="text" id="register-token" placeholder="Token" />

    <div class="progress-bar" id="progressBar"></div>

    <button id="register-btn" onclick="register()" disabled>Register</button>
    <button onclick="goToLogin()">Back to Login</button>
  </div>

  <!-- Toast Notification -->
  <div id="toast" style="
    visibility:hidden;
    min-width:250px;
    margin-left:-125px;
    background:#323232;
    color:#fff;
    text-align:center;
    border-radius:4px;
    padding:16px;
    position:fixed;
    z-index:9999;
    left:50%;
    bottom:30px;
    font-size:17px;
    cursor:pointer;
    transition:visibility 0s, opacity 0.5s linear;
    opacity:0;
  "></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
  <script src="global.js" defer></script>
  <script src="register.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      var e = document.getElementById('register-email');
      var p = document.getElementById('register-password');
      var t = document.getElementById('register-token');
      var b = document.getElementById('register-btn');
      function v(){ b.disabled = !(e.value && /@/.test(e.value) && p.value && p.value.length >= 6 && t.value); }
      [e,p,t].forEach(x=> x.addEventListener('input', v));
      if (e) e.focus();
    });
  </script>
</body>
</html>
