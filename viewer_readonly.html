<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Viewer - Readonly</title>
    
    <!-- PDF.js CSS -->
    <link rel="stylesheet" href="viewer.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- PDF.js Libraries from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <!-- Custom viewer scripts -->
    <script src="viewer_mod.js"></script>
    <script src="js/pdf.js_mobile_readonly.js"></script>
    <script src="js/firebase-cors-handler.js"></script>
</head>
<body>
    <header>
        <h1 id="title">PDF Viewer</h1>
    </header>

    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
        <!-- Static watermark overlay -->
        <div id="pdfWatermark" style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
            display: none;
        "></div>
    </div>

    <!-- Loading progress indicator -->
    <div id="customProgress" style="text-align:center;background:#FFF;min-height:95vh;display:none;"> 
        <div style="padding-top:50px;">
            <div style="display:inline-block;width:50px;height:50px;border:5px solid #ccc;border-top:5px solid #333;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <p style="margin-top:20px;color:#666;">Loading PDF...</p>
        </div>
    </div>

    <!-- Error message display -->
    <div id="errorWrapper" hidden="true">
        <div id="errorMessageLeft">
            <span id="errorMessage"></span>
            <button id="errorShowMore">More Information</button>
            <button id="errorShowLess">Less Information</button>
        </div>
        <div id="errorMessageRight">
            <button id="errorClose">Close</button>
        </div>
        <div class="clearBoth"></div>
        <textarea id="errorMoreInfo" hidden="true" readonly="readonly"></textarea>
    </div>

    <footer>
        <button class="toolbarButton pageUp" title="Previous Page" id="previous"></button>
        <button class="toolbarButton pageDown" title="Next Page" id="next"></button>
        <input type="number" id="pageNumber" class="toolbarField pageNumber" value="1" size="4" min="1">
        <button class="toolbarButton zoomOut" title="Zoom Out" id="zoomOut"></button>
        <button class="toolbarButton zoomIn" title="Zoom In" id="zoomIn"></button>
    </footer>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Mobile touch zoom styles */
        #viewerContainer {
            touch-action: manipulation;
            overflow: hidden;
        }
        
        #viewer {
            transform-origin: 0 0;
            transition: transform 0.3s ease;
        }
    </style>

    <script>
        // Mobile-only pinch-to-zoom functionality for PDF viewer
        (function() {
            let pdfZoomState = {
                scale: 1,
                initialDistance: 0,
                isZooming: false,
                isDragging: false,
                isScrolling: false,
                minScale: 0.5,
                maxScale: 4,
                zoomCenterX: 0,
                zoomCenterY: 0
            };

            function initializePDFZoom() {
                const viewerContainer = document.getElementById('viewerContainer');
                const viewer = document.getElementById('viewer');
                
                if (!viewerContainer || !viewer) return;

                // Touch event handlers for mobile only
                viewerContainer.addEventListener('touchstart', handlePDFZoomStart, { passive: false });
                viewerContainer.addEventListener('touchmove', handlePDFZoomMove, { passive: false });
                viewerContainer.addEventListener('touchend', handlePDFZoomEnd, { passive: false });

                // Prevent default touch behaviors that might interfere
                viewerContainer.addEventListener('touchstart', (e) => {
                    if (e.touches.length > 1) e.preventDefault();
                }, { passive: false });
                
                // Let zoom buttons work with original PDF.js functionality
                // Don't override them, let them work naturally
            }

            function handlePDFZoomStart(e) {
                const touches = e.touches;
                
                if (touches.length === 2) {
                    // Two fingers - start zoom
                    pdfZoomState.isZooming = true;
                    pdfZoomState.isDragging = false;
                    pdfZoomState.isScrolling = false;
                    
                    const touch1 = touches[0];
                    const touch2 = touches[1];
                    
                    pdfZoomState.initialDistance = Math.sqrt(
                        Math.pow(touch1.clientX - touch2.clientX, 2) + 
                        Math.pow(touch1.clientY - touch2.clientY, 2)
                    );
                    
                    // Calculate center point for zoom
                    const centerX = (touch1.clientX + touch2.clientX) / 2;
                    const centerY = (touch1.clientY + touch2.clientY) / 2;
                    
                    const viewerContainer = document.getElementById('viewerContainer');
                    const rect = viewerContainer.getBoundingClientRect();
                    
                    pdfZoomState.zoomCenterX = centerX - rect.left;
                    pdfZoomState.zoomCenterY = centerY - rect.top;
                    
                    e.preventDefault();
                } else if (touches.length === 1) {
                    // One finger - only allow scrolling, no dragging to avoid watermark interference
                    pdfZoomState.isDragging = false;
                    pdfZoomState.isZooming = false;
                    pdfZoomState.isScrolling = true;
                    
                    // Don't prevent default to allow natural scrolling
                    return;
                }
            }

            function handlePDFZoomMove(e) {
                const touches = e.touches;
                
                if (pdfZoomState.isZooming && touches.length === 2) {
                    const touch1 = touches[0];
                    const touch2 = touches[1];
                    
                    const currentDistance = Math.sqrt(
                        Math.pow(touch1.clientX - touch2.clientX, 2) + 
                        Math.pow(touch1.clientY - touch2.clientY, 2)
                    );
                    
                    const scaleFactor = currentDistance / pdfZoomState.initialDistance;
                    let newScale = pdfZoomState.scale * scaleFactor;
                    
                    // Clamp scale
                    newScale = Math.max(pdfZoomState.minScale, Math.min(pdfZoomState.maxScale, newScale));
                    
                    // Calculate zoom with center point
                    const scaleChange = newScale / pdfZoomState.scale;
                    
                    pdfZoomState.scale = newScale;
                    pdfZoomState.initialDistance = currentDistance;
                    
                    applyPDFTransform();
                    e.preventDefault();
                } else if (pdfZoomState.isDragging && touches.length === 1) {
                    // One finger - allow natural scrolling only, no dragging
                    return;
                }
            }

            function handlePDFZoomEnd(e) {
                if (e.touches.length === 0) {
                    pdfZoomState.isZooming = false;
                    pdfZoomState.isDragging = false;
                    pdfZoomState.isScrolling = false;
                }
            }

            function applyPDFTransform() {
                const viewer = document.getElementById('viewer');
                if (!viewer) return;
                
                // Only apply pinch-to-zoom scale, let PDF.js handle zoom buttons
                viewer.style.transform = `scale(${pdfZoomState.scale})`;
                viewer.style.transformOrigin = `${pdfZoomState.zoomCenterX}px ${pdfZoomState.zoomCenterY}px`;
                viewer.style.transition = 'transform 0.1s ease-out';
            }

            // Initialize when DOM is ready
            document.addEventListener('DOMContentLoaded', function() {
                // Wait a bit for PDF.js to initialize
                setTimeout(initializePDFZoom, 1000);
            });

            // Also initialize when the PDF viewer is loaded
            window.addEventListener('load', function() {
                setTimeout(initializePDFZoom, 1500);
            });
        })();
    </script>
</body>
</html>
