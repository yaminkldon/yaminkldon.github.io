<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Viewer - Readonly</title>
    
    <!-- PDF.js CSS -->
    <link rel="stylesheet" href="viewer.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- PDF.js Libraries from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <!-- Custom viewer scripts -->
    <script src="viewer_mod.js"></script>
    <script src="js/pdf.js_mobile_readonly.js"></script>
    <script src="js/firebase-cors-handler.js"></script>
</head>
<body>
    <header>
        <h1 id="title">PDF Viewer</h1>
    </header>

    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
        <!-- Static watermark overlay -->
        <div id="pdfWatermark" style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
            display: none;
        "></div>
    </div>

    <!-- Loading progress indicator -->
    <div id="customProgress" style="text-align:center;background:#FFF;min-height:95vh;display:none;"> 
        <div style="padding-top:50px;">
            <div style="display:inline-block;width:50px;height:50px;border:5px solid #ccc;border-top:5px solid #333;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <p style="margin-top:20px;color:#666;">Loading PDF...</p>
        </div>
    </div>

    <!-- Error message display -->
    <div id="errorWrapper" hidden="true">
        <div id="errorMessageLeft">
            <span id="errorMessage"></span>
            <button id="errorShowMore">More Information</button>
            <button id="errorShowLess">Less Information</button>
        </div>
        <div id="errorMessageRight">
            <button id="errorClose">Close</button>
        </div>
        <div class="clearBoth"></div>
        <textarea id="errorMoreInfo" hidden="true" readonly="readonly"></textarea>
    </div>

    <footer>
        <button class="toolbarButton pageUp" title="Previous Page" id="previous"></button>
        <button class="toolbarButton pageDown" title="Next Page" id="next"></button>
        <input type="number" id="pageNumber" class="toolbarField pageNumber" value="1" size="4" min="1">
        <button class="toolbarButton zoomOut" title="Zoom Out" id="zoomOut"></button>
        <button class="toolbarButton zoomIn" title="Zoom In" id="zoomIn"></button>
        <button class="toolbarButton zoomReset" title="Reset Zoom" id="zoomReset" style="display: none;">🔍</button>
    </footer>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Mobile touch zoom styles */
        #viewerContainer {
            touch-action: manipulation;
            overflow: hidden;
            position: relative;
        }
        
        #viewer {
            transform-origin: 0 0;
            transition: transform 0.3s ease;
        }
        
        .zoomReset {
            background: none !important;
            border: none !important;
            color: #fff !important;
            font-size: 16px !important;
            padding: 4px 8px !important;
            margin: 0 4px !important;
            cursor: pointer !important;
            border-radius: 3px !important;
            background: rgba(0, 0, 0, 0.3) !important;
        }
        
        .zoomReset:hover {
            background: rgba(0, 0, 0, 0.5) !important;
        }
    </style>

    <script>
        // Mobile pinch-to-zoom functionality for PDF viewer
        (function() {
            let pdfZoomState = {
                scale: 1,
                originX: 0,
                originY: 0,
                initialDistance: 0,
                isZooming: false,
                startX: 0,
                startY: 0,
                currentX: 0,
                currentY: 0,
                isDragging: false,
                minScale: 0.5,
                maxScale: 4,
                initialScale: 1
            };

            function initializePDFZoom() {
                const viewerContainer = document.getElementById('viewerContainer');
                const viewer = document.getElementById('viewer');
                const zoomResetBtn = document.getElementById('zoomReset');
                
                if (!viewerContainer || !viewer) return;

                // Store initial scale
                pdfZoomState.initialScale = 1;
                
                // Show reset button initially hidden
                if (zoomResetBtn) {
                    zoomResetBtn.style.display = 'inline-block';
                    zoomResetBtn.addEventListener('click', resetPDFZoom);
                }

                // Touch event handlers
                viewerContainer.addEventListener('touchstart', handlePDFZoomStart, { passive: false });
                viewerContainer.addEventListener('touchmove', handlePDFZoomMove, { passive: false });
                viewerContainer.addEventListener('touchend', handlePDFZoomEnd, { passive: false });

                // Mouse wheel support for desktop
                viewerContainer.addEventListener('wheel', handlePDFWheel, { passive: false });

                // Prevent default touch behaviors that might interfere
                viewerContainer.addEventListener('touchstart', (e) => {
                    if (e.touches.length > 1) e.preventDefault();
                }, { passive: false });
                
                // Override existing zoom buttons to work with our system
                const zoomInBtn = document.getElementById('zoomIn');
                const zoomOutBtn = document.getElementById('zoomOut');
                
                if (zoomInBtn) {
                    zoomInBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        zoomPDFBy(1.2);
                    });
                }
                
                if (zoomOutBtn) {
                    zoomOutBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        zoomPDFBy(0.8);
                    });
                }
            }

            function handlePDFZoomStart(e) {
                const touches = e.touches;
                
                if (touches.length === 2) {
                    // Two fingers - start zoom
                    pdfZoomState.isZooming = true;
                    pdfZoomState.isDragging = false;
                    
                    const touch1 = touches[0];
                    const touch2 = touches[1];
                    
                    pdfZoomState.initialDistance = Math.sqrt(
                        Math.pow(touch1.clientX - touch2.clientX, 2) + 
                        Math.pow(touch1.clientY - touch2.clientY, 2)
                    );
                    
                    // Calculate center point
                    const centerX = (touch1.clientX + touch2.clientX) / 2;
                    const centerY = (touch1.clientY + touch2.clientY) / 2;
                    
                    const viewerContainer = document.getElementById('viewerContainer');
                    const rect = viewerContainer.getBoundingClientRect();
                    
                    pdfZoomState.originX = centerX - rect.left;
                    pdfZoomState.originY = centerY - rect.top;
                    
                    e.preventDefault();
                } else if (touches.length === 1 && pdfZoomState.scale > 1) {
                    // One finger - start drag if zoomed
                    pdfZoomState.isDragging = true;
                    pdfZoomState.isZooming = false;
                    
                    pdfZoomState.startX = touches[0].clientX - pdfZoomState.currentX;
                    pdfZoomState.startY = touches[0].clientY - pdfZoomState.currentY;
                }
            }

            function handlePDFZoomMove(e) {
                const touches = e.touches;
                
                if (pdfZoomState.isZooming && touches.length === 2) {
                    const touch1 = touches[0];
                    const touch2 = touches[1];
                    
                    const currentDistance = Math.sqrt(
                        Math.pow(touch1.clientX - touch2.clientX, 2) + 
                        Math.pow(touch1.clientY - touch2.clientY, 2)
                    );
                    
                    const scaleFactor = currentDistance / pdfZoomState.initialDistance;
                    let newScale = pdfZoomState.scale * scaleFactor;
                    
                    // Clamp scale
                    newScale = Math.max(pdfZoomState.minScale, Math.min(pdfZoomState.maxScale, newScale));
                    
                    pdfZoomState.scale = newScale;
                    pdfZoomState.initialDistance = currentDistance;
                    
                    applyPDFTransform();
                    e.preventDefault();
                } else if (pdfZoomState.isDragging && touches.length === 1) {
                    pdfZoomState.currentX = touches[0].clientX - pdfZoomState.startX;
                    pdfZoomState.currentY = touches[0].clientY - pdfZoomState.startY;
                    
                    applyPDFTransform();
                    e.preventDefault();
                }
            }

            function handlePDFZoomEnd(e) {
                if (e.touches.length === 0) {
                    pdfZoomState.isZooming = false;
                    pdfZoomState.isDragging = false;
                }
            }

            function handlePDFWheel(e) {
                e.preventDefault();
                
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                zoomPDFBy(delta, e.clientX, e.clientY);
            }

            function zoomPDFBy(factor, clientX, clientY) {
                let newScale = pdfZoomState.scale * factor;
                
                // Clamp scale
                newScale = Math.max(pdfZoomState.minScale, Math.min(pdfZoomState.maxScale, newScale));
                
                if (newScale !== pdfZoomState.scale) {
                    if (clientX !== undefined && clientY !== undefined) {
                        const viewerContainer = document.getElementById('viewerContainer');
                        const rect = viewerContainer.getBoundingClientRect();
                        
                        pdfZoomState.originX = clientX - rect.left;
                        pdfZoomState.originY = clientY - rect.top;
                    }
                    
                    pdfZoomState.scale = newScale;
                    applyPDFTransform();
                }
            }

            function applyPDFTransform() {
                const viewer = document.getElementById('viewer');
                if (!viewer) return;
                
                const transformOrigin = `${pdfZoomState.originX}px ${pdfZoomState.originY}px`;
                const transform = `scale(${pdfZoomState.scale}) translate(${pdfZoomState.currentX}px, ${pdfZoomState.currentY}px)`;
                
                viewer.style.transformOrigin = transformOrigin;
                viewer.style.transform = transform;
            }

            function resetPDFZoom() {
                pdfZoomState.scale = pdfZoomState.initialScale;
                pdfZoomState.currentX = 0;
                pdfZoomState.currentY = 0;
                pdfZoomState.originX = 0;
                pdfZoomState.originY = 0;
                
                applyPDFTransform();
            }

            // Initialize when DOM is ready
            document.addEventListener('DOMContentLoaded', function() {
                // Wait a bit for PDF.js to initialize
                setTimeout(initializePDFZoom, 1000);
            });

            // Also initialize when the PDF viewer is loaded
            window.addEventListener('load', function() {
                setTimeout(initializePDFZoom, 1500);
            });
        })();
    </script>
</body>
</html>
