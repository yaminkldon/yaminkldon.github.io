<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer - Readonly</title>
    
    <!-- PDF.js CSS -->
    <link rel="stylesheet" href="viewer.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- PDF.js Libraries from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <!-- Custom viewer scripts -->
    <script src="viewer_mod.js"></script>
    <script src="js/pdf.js_mobile_readonly.js"></script>
    <script src="js/firebase-cors-handler.js"></script>
    
    <style>
        /* Fullscreen PDF viewer styles */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #333;
        }
        
        #viewerContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            background: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #viewer {
            width: 100%;
            height: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        header {
            display: none; /* Hide header for fullscreen */
        }
        
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .toolbarButton {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .toolbarButton:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .toolbarField {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px;
            border-radius: 3px;
            width: 60px;
            text-align: center;
        }
        
        #customProgress {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 8px;
            z-index: 300;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1 id="title">PDF Viewer</h1>
    </header>

    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
        <!-- Static watermark overlay -->
        <div id="pdfWatermark" style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
            display: none;
        "></div>
    </div>

    <!-- Loading progress indicator -->
    <div id="customProgress" style="text-align:center;background:rgba(0,0,0,0.8);color:white;padding:20px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;display:none;"> 
        <div style="padding-top:20px;">
            <div style="display:inline-block;width:50px;height:50px;border:5px solid #666;border-top:5px solid #fff;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <p style="margin-top:20px;color:#fff;">Loading PDF...</p>
        </div>
    </div>

    <!-- Error message display -->
    <div id="errorWrapper" hidden="true">
        <div id="errorMessageLeft">
            <span id="errorMessage"></span>
            <button id="errorShowMore">More Information</button>
            <button id="errorShowLess">Less Information</button>
        </div>
        <div id="errorMessageRight">
            <button id="errorClose">Close</button>
        </div>
        <div class="clearBoth"></div>
        <textarea id="errorMoreInfo" hidden="true" readonly="readonly"></textarea>
    </div>

    <footer>
        <button class="toolbarButton pageUp" title="Previous Page" id="previous"></button>
        <button class="toolbarButton pageDown" title="Next Page" id="next"></button>
        <input type="number" id="pageNumber" class="toolbarField pageNumber" value="1" size="4" min="1">
        <button class="toolbarButton zoomOut" title="Zoom Out" id="zoomOut"></button>
        <button class="toolbarButton zoomIn" title="Zoom In" id="zoomIn"></button>
        <button class="toolbarButton fitPage" title="Fit to Page" id="fitPage" style="color: white; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; padding: 4px 8px; margin-left: 10px;">Fit</button>
    </footer>
</body>
</html>
