<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Settings</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --base-font-size: 16px;
      --player-primary: #6c4fc1;
      --player-background: rgba(0,0,0,0.8);
      --player-text: #ffffff;
      --player-accent: #8a66d9;
    }

    body {
      margin: 0;
      background: #f7f4fb;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: var(--base-font-size);
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark-mode {
      background: #1a1a1a;
      color: #fff;
    }

    .appbar {
      height: 56px;
      background: #6c4fc1;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1001;
    }

    .appbar .material-icons {
      cursor: pointer;
      margin-right: 16px;
    }

    .main-content {
      margin-top: 56px;
      padding: 32px 16px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .section {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body.dark-mode .section {
      background: #2d2d2d;
    }

    .section-title {
      font-size: 20px;
      font-weight: bold;
      color: #222c5c;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    body.dark-mode .section-title {
      color: #fff;
    }

    .setting-group {
      margin-bottom: 24px;
    }

    .setting-group:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }

    body.dark-mode .setting-label {
      color: #e0e0e0;
    }

    .setting-description {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }

    body.dark-mode .setting-description {
      color: #ccc;
    }

    .setting-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .setting-input:focus {
      outline: none;
      border-color: #6c4fc1;
    }

    body.dark-mode .setting-input {
      background: #3d3d3d;
      border-color: #555;
      color: #fff;
    }

    .setting-select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      background: white;
      cursor: pointer;
    }

    body.dark-mode .setting-select {
      background: #3d3d3d;
      border-color: #555;
      color: #fff;
    }

    .setting-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .setting-button {
      padding: 8px 16px;
      border: 2px solid #6c4fc1;
      border-radius: 6px;
      background: transparent;
      color: #6c4fc1;
      cursor: pointer;
      transition: all 0.3s;
    }

    .setting-button.active {
      background: #6c4fc1;
      color: white;
    }

    .setting-button:hover {
      background: #6c4fc1;
      color: white;
    }

    .theme-preview {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .theme-option {
      width: 120px;
      height: 80px;
      border-radius: 8px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .theme-option.active {
      border-color: #6c4fc1;
    }

    .theme-option .theme-preview-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
    }

    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .goal-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      border: 2px solid #e0e0e0;
    }

    body.dark-mode .goal-card {
      background: #3d3d3d;
      border-color: #555;
    }

    .goal-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #6c4fc1;
    }

    .goal-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    body.dark-mode .goal-input {
      background: #2d2d2d;
      border-color: #555;
      color: #fff;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #6c4fc1;
      transition: width 0.3s;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .analytics-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      border: 2px solid #e0e0e0;
    }

    body.dark-mode .analytics-card {
      background: #3d3d3d;
      border-color: #555;
    }

    .analytics-value {
      font-size: 24px;
      font-weight: bold;
      color: #6c4fc1;
      margin-bottom: 4px;
    }

    .analytics-label {
      font-size: 14px;
      color: #666;
    }

    body.dark-mode .analytics-label {
      color: #ccc;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-top: 16px;
    }

    .calendar-day {
      aspect-ratio: 1;
      background: #f0f0f0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #666;
      position: relative;
    }

    .calendar-day.has-activity {
      background: #6c4fc1;
      color: white;
    }

    .calendar-day.today {
      border: 2px solid #6c4fc1;
    }

    .recommendations-list {
      margin-top: 16px;
    }

    .recommendation-item {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid #6c4fc1;
    }

    body.dark-mode .recommendation-item {
      background: #3d3d3d;
    }

    .recommendation-title {
      font-weight: bold;
      color: #6c4fc1;
      margin-bottom: 4px;
    }

    .recommendation-description {
      font-size: 14px;
      color: #666;
    }

    body.dark-mode .recommendation-description {
      color: #ccc;
    }

    .search-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-label {
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    body.dark-mode .filter-label {
      color: #e0e0e0;
    }

    .filter-select {
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
    }

    body.dark-mode .filter-select {
      background: #3d3d3d;
      border-color: #555;
      color: #fff;
    }

    @media (max-width: 768px) {
      .main-content {
        padding: 16px;
      }
      
      .section {
        padding: 16px;
      }
      
      .setting-buttons {
        flex-direction: column;
      }
      
      .theme-preview {
        flex-wrap: wrap;
      }
      
      .goals-grid {
        grid-template-columns: 1fr;
      }
      
      .search-filters {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="appbar">
    <span class="material-icons" onclick="goBack()">arrow_back</span>
    <span style="font-size:1.2em;flex:1;" data-translate="settings">Advanced Settings</span>
  </div>

  <div class="main-content">
    <!-- Language Support Section -->
    <div class="section">
      <div class="section-title">
        <span class="material-icons">language</span>
        <span>Language / اللغة</span>
      </div>
      
      <div class="setting-group">
        <label class="setting-label">Interface Language</label>
        <p class="setting-description">Choose your preferred language for the interface</p>
        <div class="setting-buttons">
          <button class="setting-button" onclick="setLanguage('en')" id="lang-en">English</button>
          <button class="setting-button" onclick="setLanguage('ar')" id="lang-ar">العربية</button>
        </div>
      </div>
    </div>

    <!-- Accessibility Section -->
    <div class="section">
      <div class="section-title">
        <span class="material-icons">accessibility</span>
        <span>Accessibility</span>
      </div>
      
      <div class="setting-group">
        <label class="setting-label">Font Size</label>
        <p class="setting-description">Adjust text size for better readability</p>
        <div class="setting-buttons">
          <button class="setting-button" onclick="setFontSize('small')" id="font-small">Small</button>
          <button class="setting-button" onclick="setFontSize('medium')" id="font-medium">Medium</button>
          <button class="setting-button" onclick="setFontSize('large')" id="font-large">Large</button>
          <button class="setting-button" onclick="setFontSize('xlarge')" id="font-xlarge">Extra Large</button>
        </div>
      </div>
    </div>

    <!-- Layout Preferences Section -->
    <div class="section">
      <div class="section-title">
        <span class="material-icons">grid_view</span>
        <span>Layout Preferences</span>
      </div>
      
      <div class="setting-group">
        <label class="setting-label">Grid Layout</label>
        <p class="setting-description">Choose how many lessons to display per row</p>
        <div class="setting-buttons">
          <button class="setting-button" onclick="setLayout('2x2')" id="layout-2x2">2x2 Grid</button>
          <button class="setting-button" onclick="setLayout('3x3')" id="layout-3x3">3x3 Grid</button>
          <button class="setting-button" onclick="setLayout('4x4')" id="layout-4x4">4x4 Grid</button>
        </div>
      </div>
    </div>
  </div>

  <script src="local-firebase-compat.js"></script>
  <script src="global.js"></script>
  <script src="advanced-features.js"></script>
  <script src="advanced-settings.js"></script>
</body>
</html>
