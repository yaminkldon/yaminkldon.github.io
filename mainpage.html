<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Main Page</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { margin:0; background: #f7f4fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .appbar {
      height: 56px;
      background: #6c4fc1;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1001;
    }
    .appbar .material-icons { cursor: pointer; margin-right: 16px; }
    .drawer-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.2);
      z-index: 1000;
    }
    .drawer {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0,0,0,0.08);
      transform: translateX(-100%);
      transition: transform 0.25s;
      z-index: 1000;
      padding-top: 56px;
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer ul {
      list-style: none; padding: 0; margin: 0;
      flex: 1 1 auto;
      /* This makes the ul take all available space except for the button */
    }
    .drawer li { padding: 18px 24px; color: #222c5c; cursor: pointer; }
    .drawer li:hover { background: #f0f0f0; }
    .drawer button {
      width: 90%;
      margin: 0 auto 100px auto;
      padding: 12px 0;
      background: #6c4fc1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .main-content {
      margin-top: 56px;
      padding: 32px 16px 80px 16px;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .fab {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 56px; height: 56px;
      background: #6c4fc1;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      font-size: 2em;
      cursor: pointer;
      z-index: 1100;
      border: none;
      outline: none;
      transition: background 0.2s;
    }
    .fab:hover { background: #5436a7; }
    .lesson-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 32px;
      justify-content: center;
    }
@media (max-width: 700px) {
  .lesson-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 8px; /* vertical and horizontal gap */
    justify-content: center;
  }
  .lesson-card {
    width: 30vw;      /* About 3 per row */
    min-width: 90px;
    max-width: 110px;
    height: 130px;
    margin-bottom: 12px;
    padding: 6px;
  }
  .lesson-thumbnail {
    width: 100%;
    max-width: 90px;
    height: 60px;
    object-fit: cover;
    margin-bottom: 8px;
    border-radius: 6px;
  }
}
    .lesson-card {
      background: #fff;
      color: #222c5c;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      flex-direction: column;
      transition: box-shadow 0.2s;
    }
    .lesson-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.16); }
    .lesson-details {
      margin-top: 32px;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 600px;
    }
    .lesson-thumbnail {
      width: 100%;
      max-width: 480px;
      border-radius: 8px;
      margin-bottom: 16px;
      pointer-events: none;
      filter: grayscale(0.5) brightness(0.7);
    }
    .play-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 24px;
      background: #222c5c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
    }
    .play-btn:hover { background: #31418a; }
    /* Ensure the modal and video fill the screen */
#video-modal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0; top: 0; width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.95);
  align-items: center;
  justify-content: center;
  padding: 0;
  margin: 0;
}
#video-modal .video-js,
#video-modal video {
  width: 100vw !important;
  height: 100vh !important;
  max-width: 100vw !important;
  max-height: 100vh !important;
  object-fit: contain;
  background: #000;
  margin: 0;
  padding: 0;
  border-radius: 0;
}
  </style>
</head>
<body>
  <div class="appbar">
    <span class="material-icons" onclick="toggleDrawer()" style="z-index:1101;position:relative;">menu</span>
    <span style="font-size:1.2em;flex:1;">Home</span>
  </div>
  <div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
  <nav class="drawer" id="drawer">
    <ul id="units-list"></ul>
    <button onclick="logout()">Logout</button>
  </nav>
  <div class="main-content" id="main-content">
    <div id="home-fragment-msg" style="margin-top:40px; font-size:1.3em; color:#222c5c;">This is home Fragment</div>
    <div class="lesson-grid" id="lesson-grid"></div>
    <div class="lesson-details" id="lesson-details" style="display:none;"></div>
  </div>
  <button class="fab" onclick="onFabClick()">
    <span class="material-icons">mail</span>
  </button>
<div id="video-modal">
  <div style="position:relative;width:100vw;height:100vh;">
    <button id="video-close-btn" onclick="closeVideoModal()" style="
      position:absolute;top:16px;right:16px;z-index:3000;
      background:rgba(0,0,0,0.5);color:#fff;border:none;
      border-radius:50%;width:40px;height:40px;font-size:2em;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    ">&times;</button>
    <video id="fullscreen-video" class="video-js vjs-default-skin" playsinline controls preload="auto"></video>
  </div>
</div>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <link href="https://unpkg.com/videojs-mobile-ui/dist/videojs-mobile-ui.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script src="https://unpkg.com/videojs-mobile-ui/dist/videojs-mobile-ui.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
  <script src="mainpage.js"></script>
  <script>
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-backdrop').style.display = 'block';
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-backdrop').style.display = 'none';
    }
    function toggleDrawer() {
  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('drawer-backdrop');
  if (drawer.classList.contains('open')) {
    drawer.classList.remove('open');
    backdrop.style.display = 'none';
  } else {
    drawer.classList.add('open');
    backdrop.style.display = 'block';
  }
}
    function onFabClick() {
      // Example: open mail or show a message
      alert("FAB clicked!");
    }
  </script>
</body>
</html>
