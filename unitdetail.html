<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unit Detail</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { margin:0; background: #f7f4fb; font-family: 'Segoe UI', Arial, sans-serif; transition: background-color 0.3s, color 0.3s; }
    body.dark-mode { background: #1a1a1a; color: #fff; }
    body.dark-mode .lesson-card { background: #2d2d2d; color: #fff; }
    body.dark-mode .video-container { background: #2d2d2d; }
    .appbar {
      height: 56px;
      background: #6c4fc1;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1001;
    }
    .appbar .material-icons { cursor: pointer; margin-right: 16px; }
    .main-content {
      margin-top: 56px;
      padding: 32px 16px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .unit-title {
      font-size: 24px;
      font-weight: bold;
      color: #222c5c;
      margin-bottom: 24px;
      text-align: center;
    }
    body.dark-mode .unit-title { color: #fff; }
    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    
    /* Mobile responsive - 2 columns on mobile */
    @media (max-width: 768px) {
      .lessons-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
    }
    
    /* Small mobile - 1 column on very small screens */
    @media (max-width: 480px) {
      .lessons-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
    }
    .lesson-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .lesson-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.16); }
    .lesson-thumbnail {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
      background: #f0f0f0;
    }
    .lesson-title {
      font-weight: bold;
      color: #222c5c;
      margin-bottom: 8px;
      font-size: 16px;
      line-height: 1.3;
    }
    body.dark-mode .lesson-title { color: #fff; }
    .lesson-description {
      color: #666;
      font-size: 13px;
      line-height: 1.4;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Mobile adjustments */
    @media (max-width: 768px) {
      .lesson-thumbnail {
        height: 100px;
      }
      .lesson-title {
        font-size: 14px;
      }
      .lesson-description {
        font-size: 12px;
        -webkit-line-clamp: 2;
      }
    }
    body.dark-mode .lesson-description { color: #ccc; }
    .video-container {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-top: 24px;
      display: none;
      position: relative;
    }
    .video-controls-overlay {
      position: absolute;
      top: 70px;
      right: 24px;
      z-index: 10;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .playback-speed-control {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .speed-selector {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
    }
    .speed-selector option {
      background: #333;
      color: white;
    }
    .video-quality-control {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .quality-selector {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
    }
    .quality-selector option {
      background: #333;
      color: white;
    }
    .captions-control {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .captions-selector {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
    }
    .captions-selector option {
      background: #333;
      color: white;
    }
    .custom-captions {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 16px;
      max-width: 80%;
      text-align: center;
      z-index: 15;
      display: none;
      line-height: 1.4;
    }
    .lesson-notes-panel {
      position: absolute;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      border-radius: 0 8px 8px 0;
      transition: right 0.3s ease;
      z-index: 20;
      overflow-y: auto;
    }
    .lesson-notes-panel.open {
      right: 0;
    }
    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    .notes-header h4 {
      margin: 0;
      font-size: 16px;
    }
    .notes-toggle {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .notes-content {
      padding: 16px;
    }
    .add-note-section {
      margin-bottom: 20px;
    }
    .bookmark-btn, .save-note-btn {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: #6c4fc1;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .bookmark-btn:hover, .save-note-btn:hover {
      background: #5436a7;
    }
    #note-input {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 8px;
    }
    #note-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    .note-item {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      border-left: 3px solid #6c4fc1;
    }
    .note-timestamp {
      font-size: 12px;
      color: #ccc;
      margin-bottom: 4px;
    }
    .note-text {
      font-size: 14px;
      line-height: 1.4;
    }
    .note-bookmark {
      background: rgba(255, 193, 7, 0.2);
      border-left-color: #ffc107;
    }
    .note-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .note-action-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    .note-action-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .video-player {
      width: 100%;
      border-radius: 8px;
    }
    /* Hide download button */
    .video-player::-webkit-media-controls-enclosure {
      overflow: hidden;
    }
    .video-player::-webkit-media-controls-panel {
      width: calc(100% + 30px); /* Push download button out of view */
      margin-left: -15px;
    }
    /* For Firefox */
    .video-player::-moz-media-controls-download-button {
      display: none !important;
    }
    /* General approach */
    .video-player[controlslist*="nodownload"] {
      controlslist: "nodownload";
    }
    .video-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #222c5c;
    }
    body.dark-mode .video-title { color: #fff; }
    .close-video {
      background: #e0e0e0;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 16px;
    }
    .close-video:hover { background: #d0d0d0; }
  </style>
</head>
<body>
  <div class="appbar">
    <span class="material-icons" onclick="goBack()">arrow_back</span>
    <span style="font-size:1.2em;flex:1;" id="unit-title-header">Unit Detail</span>
  </div>

  <div class="main-content">
    <h1 class="unit-title" id="unit-title">Loading...</h1>
    <div class="lessons-grid" id="lessons-grid"></div>
    
    <div class="video-container" id="video-container">
      <h3 class="video-title" id="video-title"></h3>
      <div class="video-controls-overlay">
        <div class="playback-speed-control">
          <label for="speed-select">Speed:</label>
          <select id="speed-select" class="speed-selector">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </div>
        <div class="video-quality-control">
          <label for="quality-select">Quality:</label>
          <select id="quality-select" class="quality-selector">
            <option value="auto" selected>Auto</option>
            <option value="1080">1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
            <option value="360">360p</option>
          </select>
        </div>
        <div class="captions-control">
          <label for="captions-select">Captions:</label>
          <select id="captions-select" class="captions-selector">
            <option value="off" selected>Off</option>
            <option value="en">English</option>
            <option value="ar">Arabic</option>
            <option value="auto">Auto-generate</option>
          </select>
        </div>
      </div>
      <video class="video-player" id="video-player" controls controlslist="nodownload">
        Your browser does not support the video tag.
      </video>
      <div id="custom-captions" class="custom-captions"></div>
      <div class="lesson-notes-panel" id="lesson-notes-panel">
        <div class="notes-header">
          <h4>Lesson Notes</h4>
          <button id="toggle-notes" class="notes-toggle">📝</button>
        </div>
        <div class="notes-content" id="notes-content">
          <div class="add-note-section">
            <button id="add-bookmark" class="bookmark-btn">Add Bookmark</button>
            <textarea id="note-input" placeholder="Add a note..." rows="3"></textarea>
            <button id="save-note" class="save-note-btn">Save Note</button>
          </div>
          <div id="notes-list" class="notes-list"></div>
        </div>
      </div>
      <button class="close-video" onclick="closeVideo()">Close Video</button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" style="
    visibility:hidden;
    min-width:250px;
    margin-left:-125px;
    background:#323232;
    color:#fff;
    text-align:center;
    border-radius:4px;
    padding:16px;
    position:fixed;
    z-index:9999;
    left:50%;
    bottom:30px;
    font-size:17px;
    cursor:pointer;
    transition:visibility 0s, opacity 0.5s linear;
    opacity:0;
  "></div>

  <!-- Version Indicator -->
  <div id="version-indicator" style="
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
    z-index: 1000;
    user-select: none;
    pointer-events: none;
  ">v1.6</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="global.js"></script>
  <script src="unitdetail.js"></script>
</body>
</html>
