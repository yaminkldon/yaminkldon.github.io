<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unit Detail</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { margin:0; background: #f7f4fb; font-family: 'Segoe UI', Arial, sans-serif; transition: background-color 0.3s, color 0.3s; }
    body.dark-mode { background: #1a1a1a; color: #fff; }
    body.dark-mode .lesson-card { background: #2d2d2d; color: #fff; }
    body.dark-mode .video-container { background: #2d2d2d; }
    .appbar {
      height: 56px;
      background: #6c4fc1;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1001;
    }
    .appbar .material-icons { cursor: pointer; margin-right: 16px; }
    .main-content {
      margin-top: 56px;
      padding: 32px 16px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .unit-title {
      font-size: 24px;
      font-weight: bold;
      color: #222c5c;
      margin-bottom: 24px;
      text-align: center;
    }
    body.dark-mode .unit-title { color: #fff; }
    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    
    /* Mobile responsive - 2 columns on mobile */
    @media (max-width: 768px) {
      .lessons-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
    }
    
    /* Small mobile - 1 column on very small screens */
    @media (max-width: 480px) {
      .lessons-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
    }
    .lesson-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .lesson-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.16); }
    .lesson-thumbnail {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
      background: #f0f0f0;
    }
    .lesson-title {
      font-weight: bold;
      color: #222c5c;
      margin-bottom: 8px;
      font-size: 16px;
      line-height: 1.3;
    }
    body.dark-mode .lesson-title { color: #fff; }
    .lesson-description {
      color: #666;
      font-size: 13px;
      line-height: 1.4;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Mobile adjustments */
    @media (max-width: 768px) {
      .lesson-thumbnail {
        height: 100px;
      }
      .lesson-title {
        font-size: 14px;
      }
      .lesson-description {
        font-size: 12px;
        -webkit-line-clamp: 2;
      }
    }
    body.dark-mode .lesson-description { color: #ccc; }
    .video-container {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-top: 24px;
      display: none;
    }
    .video-player {
      width: 100%;
      border-radius: 8px;
    }
    /* Hide download button */
    .video-player::-webkit-media-controls-enclosure {
      overflow: hidden;
    }
    .video-player::-webkit-media-controls-panel {
      width: calc(100% + 30px); /* Push download button out of view */
      margin-left: -15px;
    }
    /* For Firefox */
    .video-player::-moz-media-controls-download-button {
      display: none !important;
    }
    /* General approach */
    .video-player[controlslist*="nodownload"] {
      controlslist: "nodownload";
    }
    .video-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #222c5c;
    }
    body.dark-mode .video-title { color: #fff; }
    .close-video {
      background: #e0e0e0;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 16px;
    }
    .close-video:hover { background: #d0d0d0; }
  </style>
</head>
<body>
  <div class="appbar">
    <span class="material-icons" onclick="goBack()">arrow_back</span>
    <span style="font-size:1.2em;flex:1;" id="unit-title-header">Unit Detail</span>
  </div>

  <div class="main-content">
    <h1 class="unit-title" id="unit-title">Loading...</h1>
    <div class="lessons-grid" id="lessons-grid"></div>
    
    <div class="video-container" id="video-container">
      <h3 class="video-title" id="video-title"></h3>
      <video class="video-player" id="video-player" controls controlslist="nodownload">
        Your browser does not support the video tag.
      </video>
      <button class="close-video" onclick="closeVideo()">Close Video</button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" style="
    visibility:hidden;
    min-width:250px;
    margin-left:-125px;
    background:#323232;
    color:#fff;
    text-align:center;
    border-radius:4px;
    padding:16px;
    position:fixed;
    z-index:9999;
    left:50%;
    bottom:30px;
    font-size:17px;
    cursor:pointer;
    transition:visibility 0s, opacity 0.5s linear;
    opacity:0;
  "></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="global.js"></script>
  <script src="unitdetail.js"></script>
</body>
</html>
