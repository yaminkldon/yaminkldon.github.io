<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Reset</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <img src="account_icon.svg" alt="Account Icon" class="login-icon" />
    <h2 style="color: #6c4fc1; margin-bottom: 20px;">Reset Password</h2>
    <p style="color: #666; text-align: center; margin-bottom: 20px;">Enter your email address and we'll send you a link to reset your password.</p>

    <input type="email" id="reset-email" placeholder="Email" autocomplete="email" />
    <span id="reset-email-error" style="color:#ff5252; font-size:14px; display:none;"></span>

    <div class="progress-bar" id="progressBar"></div>

    <button id="reset-btn" onclick="resetPassword()" disabled>Send Reset Email</button>
    <button onclick="goToLogin()">Back to Login</button>
  </div>

  <!-- Toast Notification -->
  <div id="toast" style="
    visibility:hidden;
    min-width:250px;
    margin-left:-125px;
    background:#323232;
    color:#fff;
    text-align:center;
    border-radius:4px;
    padding:16px;
    position:fixed;
    z-index:9999;
    left:50%;
    bottom:30px;
    font-size:17px;
    cursor:pointer;
    transition:visibility 0s, opacity 0.5s linear;
    opacity:0;
  "></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="global.js"></script>
  <script src="password-reset.js"></script>
</body>
</html>
